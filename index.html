<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Expediente JL Torres</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="interfaz">
        <div id="btn-power" class="switch-antiguo">
            <div class="placa-metal">
                <div class="tornillo tr"></div><div class="tornillo tl"></div>
                <div class="palanca"></div>
            </div>
            <span class="label">OFF</span>
        </div>

        <div class="radio-contenedor">
            <img src="https://i.postimg.cc/yxZP1pcN/istockphoto-638856258-612x612.jpg" class="fondo-radio">
            <div id="aguja-roja"></div>
            
            <div class="fader-vertical">
                <input type="range" min="0" max="100" value="0" id="perilla" orient="vertical">
            </div>
        </div>

        <div class="display-box">
            <div class="frecuencia"><span id="mhz">88.0</span> MHz</div>
            <div class="status">SINTONIZANDO REGISTRO...</div>
        </div>
    </div>

    <audio id="snd-estatica" loop src="estatica.mp3"></audio>
    <audio id="snd-cambio" src="sintonia.mp3"></audio>
    <audio id="snd-final" src="radio jltorres.ogg"></audio>

    <script src="script.js"></script>
</body>
</html>
